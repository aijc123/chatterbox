name: Bug report (Bug 反馈)
description: 报告脚本异常、UI 错乱、弹幕没发出去之类的问题
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        感谢报 bug。请尽量填完下面字段，能省下来回追问的时间。

        - 如果是 LLM/AI 相关问题，请在"详细描述"里写清楚 provider（Anthropic / OpenAI / DeepSeek / Ollama …）和你大致用什么 model。
        - 涉及隐私的 API key、cookie、session 不要贴出来，截图记得遮一下。

  - type: input
    id: script-version
    attributes:
      label: 脚本版本
      description: 在「关于」tab 顶部能看到，例如 v2.13.4
      placeholder: v2.13.x
    validations:
      required: true

  - type: dropdown
    id: usermanager
    attributes:
      label: Userscript 管理器
      options:
        - Tampermonkey
        - Violentmonkey
        - Greasemonkey
        - 其它（请在描述里说明）
    validations:
      required: true

  - type: input
    id: usermanager-version
    attributes:
      label: 管理器版本
      placeholder: 例如 Tampermonkey 5.4.3

  - type: input
    id: browser
    attributes:
      label: 浏览器 + 版本
      placeholder: 例如 Chrome 142 / Firefox 138 / Edge 142
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: 例如 Windows 11 / macOS 15.2 / Android 14

  - type: input
    id: room
    attributes:
      label: 出问题的直播间链接（可选）
      description: 比如 https://live.bilibili.com/12345 — 有助于复现房间相关的 bug。不方便公开可以留空。
      placeholder: https://live.bilibili.com/...

  - type: textarea
    id: describe
    attributes:
      label: 详细描述
      description: 发生了什么？预期是什么？
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 观察到 ...
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: 控制台日志 / 截图
      description: F12 DevTools → Console 里的红色错误、关键的 warn；或者「日志」tab 里的相关行。直接粘贴文本即可。
      render: text

  - type: checkboxes
    id: checked
    attributes:
      label: 自查
      options:
        - label: 我已经看过「关于」tab 的更新说明，确认这不是已知问题
          required: false
        - label: 我已经搜过 issues，没找到重复
          required: false
