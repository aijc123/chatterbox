name: Mutation

# Mutation testing with Stryker-JS, scoped to pure-function modules under
# src/lib/. Not on PR / push — workflow_dispatch only.
#
# Why manual-only:
#  - Bun's test runner has no programmatic API (oven-sh/bun#26191), so stryker
#    can't drive it in-process. The community plugin (stryker-mutator-bun-runner)
#    and stryker's generic command runner both spawn the bun CLI per mutant,
#    which is several seconds × hundreds of mutants. Running on every push
#    would 10×–50× CI time for little marginal value over the existing
#    coverage check.
#  - Mutation score is most useful as a periodic deep-dive ("did our
#    coverage-by-line numbers actually exercise meaningful behavior?"),
#    not a per-commit gate.
#
# Scope expansion (2026-05): the 14-module baseline (~1500 LOC, ~1065 mutants,
# 90.23% score) was widened to 30 modules (~2800 LOC) by promoting all
# remaining pure-function modules with dedicated unit tests (Tier A small
# utilities, Tier B medium-LOC modules, Tier C: md5 + 3 auto-blend formatters).
# `auto-blend-presets.ts` is the one notable holdout — it's an orchestrator
# that fans into GM_*-backed store signals, which doesn't survive stryker's
# per-mutant CLI spawn without leaking `mock.module('$')` across files (see
# CLAUDE.md note + feedback_bun_test_mocks).
#
# Split layout (eight parallel jobs, each ~25–50 min target):
#   - core-a            (5 light original-core modules)
#   - core-b            (5 light original-core modules)
#   - heavy-wbi         (wbi.ts alone — 209 LOC, ~350 mutants)
#   - heavy-mod         (moderation.ts alone — 202 LOC, ~350 mutants)
#   - heavy-misc        (live-ws-helpers + fetch-hijack-helpers + md5)
#   - additions-small   (Tier A 8 small modules + light Tier C formatters)
#   - additions-utils   (utils + auto-blend-status — 315 LOC)
#   - additions-memes   (meme-sources + laplace-client + shadow-suggestion)
#
# Rationale for splitting from 2 → 6 → 8 shards: when the test suite
# doubled (18 → 36 test files) per-mutant runtime roughly doubled too
# (each mutant spawns the full `bun test --isolate` over all 36 files,
# ~21s baseline locally, ~25–30s on 4-vCPU CI runners with stryker's
# default concurrency = cpu_count - 1 = 3). With round-4's scope at 30
# modules / ~2090 mutants, six shards still left two (heavy-a combining
# wbi+moderation, and additions-big combining 5 medium modules) projected
# to blow the 60-min cap. Splitting those two AND raising the per-job
# timeout from 60 → 120 minutes gives comfortable headroom on every
# shard. (GitHub-hosted runners cap at 360 min on public repos, so 120
# is well within the platform limit; we keep it conservative so a hung
# job is killed sooner.)
#
# How to invoke:
#   GitHub Actions → Mutation workflow → Run workflow → master
# Locally:
#   npx --yes @stryker-mutator/core@^9 run
#   (uses stryker.config.json at repo root with full 30-module scope;
#    report at reports/mutation/. Local machines have more cores so the
#    30-in-one run completes in ~40-60 min depending on CPU count.)
#
# Why npx, not devDependency: same bun+Windows picomatch@4.0.4 transitive
# extraction bug that knocked knip / type-coverage out (see quality.yml
# header). Linux CI is fine, but pinning to npx keeps lockfile clean across
# platforms.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    name: ${{ matrix.shard.name }}
    runs-on: ubuntu-latest
    # 120 min cap — 2× headroom over the projected 50-min worst-case shard.
    # GitHub-hosted runners on public repos accept up to 360 min; we keep
    # it lower so a hung shard (e.g. stryker stuck on a single timeout)
    # gets killed before burning a full quota slot.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: core-a
            # First half of the original-core modules (lighter LOC, more
            # branches per module so still meaningful coverage).
            mutate: "src/lib/auto-blend-trend.ts,src/lib/fetch-cache.ts,src/lib/user-blacklist-parsers.ts,src/lib/remote-keywords-sanitize.ts,src/lib/custom-chat-css-sanitize.ts"
          - name: core-b
            # Second half of original-core.
            mutate: "src/lib/loop-utils.ts,src/lib/meme-room-filter.ts,src/lib/danmaku-direct-helpers.ts,src/lib/custom-chat-render.ts,src/lib/concurrency.ts"
          - name: heavy-wbi
            # wbi.ts (209 LOC) on its own — the single densest module in
            # the project. Previously paired with moderation in heavy-a;
            # the pair projected to ~70 min on 4-vCPU CI, over the 60-min
            # cap. Splitting drops each piece to ~35 min.
            mutate: "src/lib/wbi.ts"
          - name: heavy-mod
            # moderation.ts (202 LOC) on its own. See heavy-wbi rationale.
            mutate: "src/lib/moderation.ts"
          - name: heavy-misc
            # live-ws-helpers + fetch-hijack-helpers (116 LOC) + md5 (145 LOC).
            # md5 has many constants but few branches; pairing it with the
            # two original-heavy modules balances mutant count.
            mutate: "src/lib/live-ws-helpers.ts,src/lib/fetch-hijack-helpers.ts,src/lib/md5.ts"
          - name: additions-small
            # Tier A (8 small utilities, 323 LOC total) + light Tier C
            # formatters (auto-blend-preset-config 72 LOC, meme-content-key
            # 17 LOC). All small modules — collective LOC ≈ 412.
            mutate: "src/lib/version-update.ts,src/lib/custom-chat-pricing.ts,src/lib/cn.ts,src/lib/auto-blend-blacklist.ts,src/lib/platform.ts,src/lib/emote-picker-position.ts,src/lib/clipboard.ts,src/lib/sbhzm-freshness-probe.ts,src/lib/meme-content-key.ts,src/lib/auto-blend-preset-config.ts"
          - name: additions-utils
            # utils.ts (204) + auto-blend-status.ts (111) — 315 LOC. Split
            # off from the old additions-big shard (which combined all
            # Tier B + auto-blend-status at 751 LOC, projecting ~100 min
            # on CI).
            mutate: "src/lib/utils.ts,src/lib/auto-blend-status.ts"
          - name: additions-memes
            # meme-sources (246) + laplace-client (108) + shadow-suggestion
            # (82) — 436 LOC. The meme + shadow cluster, sister-shard to
            # additions-utils.
            mutate: "src/lib/meme-sources.ts,src/lib/laplace-client.ts,src/lib/shadow-suggestion.ts"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install project deps (stryker's command runner shells out to bun test)
        run: bun install --frozen-lockfile
      - name: Install Stryker + TypeScript globally
        # Why global, not npx: stryker-core's TSConfigPreprocessor unconditionally
        # imports `typescript` to parse tsconfig.json (the `disableTypeChecks:
        # true` setting only skips the type checker, not the preprocessor). npx's
        # `-p X -p Y` doesn't reliably co-locate multiple packages in one
        # node_modules, so stryker-core's ESM resolver couldn't find typescript.
        # `npm install -g` lands both in /usr/local/lib/node_modules and resolves
        # cleanly. typescript@^6.0.3 matches root package.json's devDep.
        run: npm install -g @stryker-mutator/core@^9.2.0 typescript@^6.0.3
      - name: Run Stryker (${{ matrix.shard.name }} shard)
        # `--mutate` CLI flag overrides the `mutate` field in stryker.config.json
        # so we can shard at workflow level without juggling multiple config
        # files. testRunner / commandRunner / thresholds all come from the
        # shared config. Each shard runs on its own runner filesystem, so all
        # can write the report to the same `reports/mutation/` path without
        # collision; the upload-artifact step disambiguates by shard name.
        run: stryker run --mutate "${{ matrix.shard.mutate }}"
      - name: Upload mutation HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutation-report-${{ matrix.shard.name }}
          path: reports/mutation/
          if-no-files-found: warn
          retention-days: 14
