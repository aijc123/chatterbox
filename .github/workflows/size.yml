name: Size

# Posts a "+X kB / -Y kB" comment on PRs comparing bundle size to base.
# Independent from the in-CI `scripts/analyze-bundle.mjs` budget check —
# that one fails the build on absolute budget; this one is informational and
# shows the delta inline on the PR.

on:
  pull_request:
# andresz1/size-limit-action only supports pull_request events (it errors
# with "No PR found" on push). For master-branch absolute-budget checks,
# `scripts/analyze-bundle.mjs` already runs in the CI workflow.

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: andresz1/size-limit-action@94bc357df29c36c8f8d50ea497c3e225c3c95d1d # v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_manager: bun
          build_script: build
          skip_step: install
          script: bun x size-limit
