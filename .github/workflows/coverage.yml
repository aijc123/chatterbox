name: Coverage

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  id-token: write

jobs:
  codecov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Generate coverage report
        run: bun test --coverage --coverage-reporter=lcov --isolate tests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          flags: bun
          name: bun-tests
          fail_ci_if_error: true

      - name: Upload coverage to DeepSource
        # Replaces the previous `curl https://deepsource.io/cli | sh` pattern,
        # which auto-executed whatever the upstream root URL served at run
        # time. We now use DeepSource's official action — still a third-party
        # action, but published as a tagged release, source-auditable on
        # GitHub, and (re-)pinnable to a commit SHA via Dependabot.
        # TODO: once verified, replace `@v1` with the explicit commit SHA so
        # this step is pinned the same way `codecov-action` and `setup-bun`
        # are pinned above.
        if: ${{ secrets.DEEPSOURCE_DSN != '' }}
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        uses: deepsourcelabs/test-coverage-action@v1
        with:
          key: javascript
          coverage-file: ./coverage/lcov.info
          dsn: ${{ secrets.DEEPSOURCE_DSN }}
