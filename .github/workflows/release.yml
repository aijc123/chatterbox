name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Expected version tag (vX.Y.Z), optional'
        required: false
  push:
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Verify tag matches package.json
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version != '')
        env:
          EXPECTED_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
        run: bun scripts/check-version-consistency.ts --mode post --expected-tag "$EXPECTED_TAG"

      - name: Run release checks
        env:
          SKIP_INSTALL: '1'
        run: bun run release:check

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v5
