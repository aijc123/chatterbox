name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  validate:
    # Skip on Release commits to master — those are tag-driven and covered by
    # release.yml (which runs the same release:check). Without this guard the
    # badge would still get stamped, but we'd waste a full CI run per release.
    # On non-master branches the head commit is never a Release commit, so this
    # condition is effectively a no-op there.
    if: ${{ !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Run release checks
        env:
          SKIP_INSTALL: '1'
        run: bun run release:check
