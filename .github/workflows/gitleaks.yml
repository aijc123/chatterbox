name: Gitleaks

# Secrets scan. CodeQL covers code-pattern vulns; Gitleaks specifically scans
# commit history / current tree for accidentally-committed credentials, tokens,
# private keys, API DSNs. Runs on every push + PR; weekly cron catches any
# leak that slipped past the per-PR scan (e.g. force-pushed history).

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 5 * * 1' # Mondays 05:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the scanner can audit prior commits
      # SHA pinned to v2.3.9 (resolved 2026-05-11). Refreshable via:
      #   gh api repos/gitleaks/gitleaks-action/git/refs/tags/v2.3.9 --jq .object.sha
      # Dependabot's github-actions ecosystem (see .github/dependabot.yml)
      # opens an upgrade PR when a newer release lands.
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
