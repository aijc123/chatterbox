name: Update Greasy Fork badges

on:
  schedule:
    # Every 2 hours, offset 23 minutes past to avoid GitHub Actions cron
    # congestion at the top of the hour (delayed/skipped runs are common
    # when many workflows fire at :00).
    - cron: '23 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-greasyfork-badges
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # PAT (admin scope) so the eventual `git push` bypasses master
          # branch protection's "Required status check 'validate'" rule —
          # the default GITHUB_TOKEN authenticates as github-actions[bot],
          # which is NOT on the master bypass list, so its push gets
          # rejected with GH013. If BADGE_REFRESH_PAT is unset, this
          # falls back to the default token and the workflow degrades
          # back to today's behavior (script runs, push rejected).
          # Token only needs Contents: read+write on this single repo.
          token: ${{ secrets.BADGE_REFRESH_PAT }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Refresh README badges from Greasy Fork
        run: bun scripts/update-greasyfork-badges.ts

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "README.md unchanged; skipping commit."
            exit 0
          fi
          # Commit author is the human admin (whose PAT is in use), not
          # github-actions[bot] — keeps the log uniform with manual
          # release commits and matches the bypass identity.
          git config user.name "aijc123"
          git config user.email "74703892+aijc123@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh Greasy Fork install/version badges [skip ci]"
          git push
