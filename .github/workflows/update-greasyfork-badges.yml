name: Update Greasy Fork badges

on:
  schedule:
    # Every 2 hours, offset 23 minutes past to avoid GitHub Actions cron
    # congestion at the top of the hour (delayed/skipped runs are common
    # when many workflows fire at :00).
    - cron: '23 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-greasyfork-badges
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Refresh README badges from Greasy Fork
        run: bun scripts/update-greasyfork-badges.ts

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "README.md unchanged; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh Greasy Fork install/version badges [skip ci]"
          git push
