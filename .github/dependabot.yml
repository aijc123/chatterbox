# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5

  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      preact:
        patterns:
          - 'preact'
          - '@preact/*'
    ignore:
      - dependency-name: 'vite'
        update-types: ['version-update:semver-major']
      - dependency-name: 'vite-plugin-monkey'
        update-types: ['version-update:semver-major']
      - dependency-name: 'preact'
        update-types: ['version-update:semver-major']
      - dependency-name: '@preact/preset-vite'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: '@biomejs/biome'
        update-types: ['version-update:semver-major']

  # `server/` is the chatterbox-cloud Cloudflare Worker — it has its own
  # bun.lock independent from the userscript. Without this entry, server
  # dependency upgrades had to be done by hand. OSV-Scanner does report
  # vulns against server/bun.lock (it walks the whole tree), but only
  # Dependabot opens the upgrade PRs.
  - package-ecosystem: 'bun'
    directory: '/server'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      hono:
        patterns:
          - 'hono'
          - '@hono/*'
    ignore:
      # Wrangler / @cloudflare/workers-types majors usually come with a
      # required wrangler.jsonc / runtime change — review by hand.
      - dependency-name: 'wrangler'
        update-types: ['version-update:semver-major']
      - dependency-name: '@cloudflare/workers-types'
        update-types: ['version-update:semver-major']
