# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5

  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      preact:
        patterns:
          - 'preact'
          - '@preact/*'
    ignore:
      - dependency-name: 'vite'
        update-types: ['version-update:semver-major']
      - dependency-name: 'vite-plugin-monkey'
        update-types: ['version-update:semver-major']
      - dependency-name: 'preact'
        update-types: ['version-update:semver-major']
      - dependency-name: '@preact/preset-vite'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: '@biomejs/biome'
        update-types: ['version-update:semver-major']

  # `server/` is the chatterbox-cloud Cloudflare Worker — it has its own
  # bun.lock independent from the userscript. Without this entry, server
  # dependency upgrades had to be done by hand. OSV-Scanner does report
  # vulns against server/bun.lock (it walks the whole tree), but only
  # Dependabot opens the upgrade PRs.
  - package-ecosystem: 'bun'
    directory: '/server'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
        # @cloudflare/vitest-pool-workers is pre-1.0 and treats minor
        # bumps as breaking (0.5 → 0.16 swaps the entire config API +
        # peerDep vitest version). Exclude from the group so a single
        # bump can't drag pool-workers into a broken state alongside
        # safe vitest patches. The package is fully ignored below
        # anyway, but `exclude-patterns` documents the intent and
        # protects against the rule being forgotten if a future
        # Dependabot config change drops the ignore.
        exclude-patterns:
          - '@cloudflare/vitest-pool-workers'
      hono:
        patterns:
          - 'hono'
          - '@hono/*'
    ignore:
      # Wrangler / @cloudflare/workers-types majors usually come with a
      # required wrangler.jsonc / runtime change — review by hand.
      - dependency-name: 'wrangler'
        update-types: ['version-update:semver-major']
      - dependency-name: '@cloudflare/workers-types'
        update-types: ['version-update:semver-major']
      # @cloudflare/vitest-pool-workers is pre-1.0 and version-locked to
      # a specific vitest major (0.16.x requires vitest@^4.1). Upgrading
      # it requires a coordinated vitest bump AND a config rewrite
      # (defineWorkersConfig → cloudflareTest() Vite plugin; SELF.fetch
      # → exports.default.fetch). Dependabot cannot coordinate this
      # across packages, so any bump it proposes fails CI. Always do
      # the upgrade manually as one PR.
      - dependency-name: '@cloudflare/vitest-pool-workers'
      # vitest majors must be done in lockstep with the matching
      # pool-workers release. Pin to current major; major bumps by hand.
      - dependency-name: 'vitest'
        update-types: ['version-update:semver-major']
